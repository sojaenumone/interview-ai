<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InterviewAI — 리허설</title>
<link rel="stylesheet" href="css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<style>
body { overflow: hidden; }
.interview-layout { display: flex; height: calc(100vh - 64px); margin-top: 64px; }

/* 왼쪽 패널 */
.left-col { width: 280px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
.cam-wrap { padding: 14px; border-bottom: 1px solid #f1f5f9; }
.cam-box { background: #0f172a; border-radius: 12px; aspect-ratio: 4/3; overflow: hidden; position: relative; }
.cam-box video { width: 100%; height: 100%; object-fit: cover; display: block; }
.cam-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #475569; }
.cam-placeholder span { font-size: 32px; opacity: 0.5; }
.cam-placeholder p { font-size: 12px; opacity: 0.5; }
.cam-actions { display: flex; gap: 6px; margin-top: 8px; }
.cam-btn { flex: 1; padding: 7px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; font-size: 12px; font-weight: 600; cursor: pointer; color: #475569; transition: all 0.2s; }
.cam-btn:hover { background: #eef2ff; color: #4f46e5; border-color: #c7d2fe; }
.cam-btn.on { background: #4f46e5; color: #fff; border-color: #4f46e5; }

/* 타이머 */
.timer-box { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.timer-display { font-size: 22px; font-weight: 800; color: #4f46e5; font-variant-numeric: tabular-nums; }
.timer-display.warn { color: #d97706; }
.timer-display.danger { color: #dc2626; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

/* 질문 목록 */
.q-list { flex: 1; overflow-y: auto; padding: 12px; }
.q-list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; }
.q-list-item.done { background: #f0fdf4; color: #16a34a; }
.q-list-item.current { background: #eef2ff; color: #4f46e5; font-weight: 600; border: 1.5px solid #c7d2fe; }
.q-list-item.pending { color: #94a3b8; }
.q-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.q-list-item.done .q-num { background: #dcfce7; color: #16a34a; }
.q-list-item.current .q-num { background: #4f46e5; color: #fff; }
.q-list-item.pending .q-num { background: #f1f5f9; color: #94a3b8; }

/* 중앙 패널 */
.center-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
.interview-header { padding: 16px 24px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
.progress-wrap { flex: 1; max-width: 300px; }
.progress-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
.interview-body { flex: 1; overflow-y: auto; padding: 24px; }

/* 질문 카드 */
.q-card { background: #fff; border-radius: 16px; border: 2px solid #c7d2fe; padding: 24px; margin-bottom: 20px; }
.q-card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.q-card-text { font-size: 17px; font-weight: 700; color: #1e293b; line-height: 1.65; margin-bottom: 14px; }
.q-hint { background: #f8fafc; border-left: 3px solid #c7d2fe; border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; color: #64748b; line-height: 1.6; }

/* 피드백 카드 */
.fb-card { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; padding: 22px; margin-bottom: 20px; }
.fb-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.fb-score-big { font-size: 36px; font-weight: 800; color: #4f46e5; line-height: 1; }
.fb-score-label { font-size: 12px; color: #94a3b8; }
.fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.fb-box { padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.6; }
.fb-good { background: #f0fdf4; border: 1px solid #bbf7d0; }
.fb-good .fb-box-title { color: #16a34a; font-weight: 700; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.fb-improve { background: #fff7ed; border: 1px solid #fed7aa; }
.fb-improve .fb-box-title { color: #d97706; font-weight: 700; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.fb-overall { background: #f8fafc; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #475569; line-height: 1.7; margin-bottom: 16px; }

/* 입력 영역 */
.input-area { background: #fff; border-top: 1px solid #e2e8f0; padding: 14px 20px; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-row textarea { flex: 1; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; resize: none; outline: none; color: #1e293b; background: #f8fafc; transition: all 0.2s; line-height: 1.5; max-height: 120px; }
.input-row textarea:focus { border-color: #4f46e5; background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.voice-btn { width: 44px; height: 44px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 18px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #64748b; }
.voice-btn:hover { background: #eef2ff; border-color: #c7d2fe; }
.voice-btn.recording { background: #fee2e2; border-color: #fca5a5; color: #dc2626; animation: pulse 1.5s infinite; }
.submit-btn { height: 44px; padding: 0 22px; background: #4f46e5; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.submit-btn:hover:not(:disabled) { background: #4338ca; transform: translateY(-1px); }
.submit-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

/* 시작 화면 */
.start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 16px; padding: 40px; }
.start-icon { font-size: 64px; }
.start-title { font-size: 24px; font-weight: 800; color: #1e293b; }
.start-sub { font-size: 14px; color: #64748b; max-width: 400px; line-height: 1.7; }
.diff-grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 8px 0; }
.diff-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #64748b; transition: all 0.2s; }
.diff-btn:hover, .diff-btn.sel { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; }
.q-count-row { display: flex; align-items: center; gap: 10px; }
.q-count-row input[type=range] { flex: 1; accent-color: #4f46e5; }
</style>
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar">
  <div class="navbar-logo" onclick="location.href='dashboard.html'">
    <div class="logo-icon">🎯</div>
    InterviewAI
  </div>
  <div class="navbar-menu">
    <span id="navJobName" style="font-size:14px;font-weight:600;color:#64748b"></span>
    <button class="btn btn-secondary" onclick="location.href='dashboard.html'">← 대시보드</button>
  </div>
</nav>

<div class="interview-layout">
  <!-- 왼쪽 -->
  <div class="left-col">
    <div class="cam-wrap">
      <div class="cam-box">
        <video id="camVideo" autoplay muted playsinline style="display:none"></video>
        <div class="cam-placeholder" id="camPlaceholder">
          <span>📷</span>
          <p>카메라 꺼짐</p>
        </div>
      </div>
      <div class="cam-actions">
        <button class="cam-btn" id="camBtn" onclick="toggleCam()">📷 켜기</button>
        <button class="cam-btn" id="mirrorBtn" onclick="toggleMirror()" style="display:none">🔄 미러</button>
      </div>
    </div>

    <div class="timer-box">
      <div>
        <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:2px">경과 시간</div>
        <div class="timer-display" id="timerDisplay">00:00</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:2px">상태</div>
        <div id="statusBadge" class="badge badge-gray">대기 중</div>
      </div>
    </div>

    <div style="padding:12px 12px 6px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px">질문 목록</div>
    <div class="q-list" id="qList">
      <div style="font-size:13px;color:#94a3b8;text-align:center;padding:20px">면접을 시작하면<br/>질문 목록이 표시됩니다</div>
    </div>
  </div>

  <!-- 중앙 -->
  <div class="center-col">
    <div class="interview-header">
      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">준비 중...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" id="skipBtn" onclick="skipQuestion()" style="display:none">건너뛰기</button>
        <button class="btn btn-danger" id="endBtn" onclick="endInterview()" style="display:none">종료</button>
      </div>
    </div>

    <div class="interview-body" id="interviewBody">
      <!-- 시작 화면 -->
      <div class="start-screen" id="startScreen">
        <div class="start-icon">🎯</div>
        <div class="start-title" id="startTitle">면접을 시작할까요?</div>
        <div class="start-sub" id="startSub">아래 옵션을 설정하고 면접을 시작하세요.</div>

        <div style="width:100%;max-width:400px;text-align:left">
          <div class="form-group">
            <label>직무</label>
            <input type="text" id="jobInput" placeholder="예: 프론트엔드 개발자"/>
          </div>
          <div class="form-group">
            <label>난이도</label>
            <div class="diff-grid">
              <button class="diff-btn" onclick="setDiff(this,'입문')">🌱 입문</button>
              <button class="diff-btn sel" onclick="setDiff(this,'일반')">⭐ 일반</button>
              <button class="diff-btn" onclick="setDiff(this,'심화')">🔥 심화</button>
            </div>
          </div>
          <div class="form-group">
            <label>질문 수: <span id="qCountLabel">5</span>개</label>
            <input type="range" min="3" max="10" value="5" oninput="document.getElementById('qCountLabel').textContent=this.value" id="qCountInput"/>
          </div>
        </div>
        <button class="btn btn-primary btn-lg" id="startBtn" onclick="startInterview()" style="min-width:200px">
          <span id="startBtnText">면접 시작 →</span>
        </button>
      </div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-area" id="inputArea" style="display:none">
      <div class="input-row">
        <textarea id="answerInput" rows="2" placeholder="답변을 입력하세요... (Shift+Enter로 줄바꿈, Enter로 제출)" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="음성 입력">🎤</button>
        <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">제출</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/auth.js"></script>
<script src="js/gemini.js"></script>
<script src="js/interview.js"></script>
</body>
</html>
